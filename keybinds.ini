# NES Emulator key bindings
# Edit this file to remap controls, then restart the emulator.
# Duplicate keys are not allowed; conflicting entries fall back to defaults.
#
# Supported key names:
#   Letters : A B C ... Z
#   Numbers : Num0 Num1 ... Num9
#   Numpad  : Numpad0 Numpad1 ... Numpad9
#   Function: F1 F2 ... F15
#   Arrows  : Up Down Left Right
#   Special : Space Return BackSpace Tab Escape Pause
#             LShift RShift LControl RControl LAlt RAlt
#             LBracket RBracket SemiColon Comma Period
#             Quote Slash BackSlash Tilde Equal Dash
#             Home End PageUp PageDown Insert Delete

[player1]
up     = Up
down   = Down
left   = Left
right  = Right
a      = Z
b      = X
select = RShift
start  = Return

[player2]
up     = W
down   = S
left   = A
right  = D
a      = F
b      = G
select = LShift
start  = Tab

[emulator]
pause      = Space
step_frame = F2
reset      = R
fullscreen = F11
load_rom   = O
quit       = Escape
